basePath: /
definitions:
  keys.VirtualKey:
    properties:
      expires_at:
        type: string
      id:
        type: string
      one_shot:
        type: boolean
      rate_limit:
        type: integer
      scope:
        type: string
      source:
        type: string
      target:
        type: string
      used:
        type: boolean
    type: object
  orgs.Membership:
    properties:
      org_id:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  orgs.Organization:
    properties:
      domain:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  rootkeys.RootKey:
    properties:
      api_key:
        type: string
      id:
        type: string
      key_hint:
        type: string
    type: object
  routes.CreateUserRequest:
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice
        type: string
      org_id:
        example: ""
        type: string
      org_name:
        example: Acme
        type: string
      role:
        example: member
        type: string
    type: object
  routes.CreateUserResponse:
    properties:
      api_key:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  routes.ErrorResponse:
    properties:
      error:
        example: not found
        type: string
    type: object
  routes.SetupRequest:
    properties:
      email:
        example: admin@example.com
        type: string
      name:
        example: Admin
        type: string
      org_name:
        example: My Org
        type: string
    type: object
  routes.SetupResponse:
    properties:
      api_key:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  routes.mcpError:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  routes.mcpRequest:
    properties:
      id: {}
      jsonrpc:
        type: string
      method:
        type: string
      params:
        items:
          type: integer
        type: array
    type: object
  routes.mcpResponse:
    properties:
      error:
        $ref: '#/definitions/routes.mcpError'
      id: {}
      jsonrpc:
        type: string
      result: {}
    type: object
  routes.servicetokenRequest:
    properties:
      rate_limit:
        type: integer
      service:
        type: string
      ttl_seconds:
        type: integer
    type: object
  routes.servicetokenResponse:
    properties:
      expires_at:
        type: string
      key:
        type: string
    type: object
  routes.usageListResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/usage.Event'
        type: array
      total:
        type: integer
    type: object
  serviceaccounts.ServiceAccount:
    properties:
      allowed_services:
        items:
          type: string
        type: array
      api_key:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  services.Service:
    properties:
      credential_header:
        type: string
      endpoint:
        type: string
      id:
        type: string
      root_key_id:
        type: string
    type: object
  usage.Event:
    properties:
      completion_tokens:
        type: integer
      id:
        type: integer
      key_id:
        type: string
      latency_ms:
        type: integer
      prompt_tokens:
        type: integer
      service:
        type: string
      status_code:
        type: integer
      timestamp:
        type: string
      total_tokens:
        type: integer
    type: object
host: localhost:3333
info:
  contact:
    name: Bifrost
  description: Secure, delegated API access proxy. Maps short-lived virtual keys to
    real credentials and transparently proxies requests to upstream services.
  license:
    name: MIT
  title: Bifrost API
  version: "1.0"
paths:
  /docs/openapi.json:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
      summary: OpenAPI spec (JSON)
      tags:
      - health
  /docs/openapi.yaml:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: OpenAPI spec (YAML)
      tags:
      - health
  /healthz:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: ok
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /mcp:
    post:
      consumes:
      - application/json
      description: JSON-RPC 2.0 endpoint implementing the Model Context Protocol.
        Supports initialize, tools/list, and tools/call methods.
      parameters:
      - description: JSON-RPC 2.0 request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.mcpRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.mcpResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: MCP server
      tags:
      - mcp
  /v1/keys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/keys.VirtualKey'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List virtual keys
      tags:
      - virtual-keys
    post:
      consumes:
      - application/json
      parameters:
      - description: Virtual key to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/keys.VirtualKey'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/keys.VirtualKey'
        "400":
          description: invalid scope, rate_limit, or expires_at
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: service not found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: key already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create virtual key
      tags:
      - virtual-keys
  /v1/keys/{id}:
    delete:
      parameters:
      - description: Virtual key ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Revoke virtual key
      tags:
      - virtual-keys
  /v1/keys/{id}/usage:
    get:
      parameters:
      - description: Virtual key ID
        in: path
        name: id
        required: true
        type: string
      - description: Start time (RFC3339)
        in: query
        name: from
        type: string
      - description: End time (RFC3339)
        in: query
        name: to
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.usageListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List usage events for a virtual key
      tags:
      - virtual-keys
  /v1/orgs:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/orgs.Organization'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/orgs.Organization'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/orgs.Organization'
        "400":
          description: missing name
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: organization already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create organization
      tags:
      - organizations
  /v1/orgs/{id}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Delete organization
      tags:
      - organizations
    get:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/orgs.Organization'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get organization
      tags:
      - organizations
  /v1/orgs/{id}/members:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/orgs.Membership'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List organization members
      tags:
      - organizations
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Membership to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/orgs.Membership'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/orgs.Membership'
        "400":
          description: missing user_id or invalid role
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: organization not found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: membership already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Add member to organization
      tags:
      - organizations
  /v1/orgs/{id}/members/{userID}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Remove member from organization
      tags:
      - organizations
  /v1/rootkeys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/rootkeys.RootKey'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List root keys
      tags:
      - root-keys
    post:
      consumes:
      - application/json
      parameters:
      - description: Root key to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rootkeys.RootKey'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/rootkeys.RootKey'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: root key already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create root key
      tags:
      - root-keys
  /v1/rootkeys/{id}:
    delete:
      parameters:
      - description: Root key ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Delete root key
      tags:
      - root-keys
    put:
      consumes:
      - application/json
      parameters:
      - description: Root key ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated root key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rootkeys.RootKey'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rootkeys.RootKey'
        "400":
          description: invalid request or id mismatch
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Update root key
      tags:
      - root-keys
  /v1/service-token:
    post:
      consumes:
      - application/json
      parameters:
      - description: Service account API key
        in: header
        name: X-Service-Key
        required: true
        type: string
      - description: Token request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.servicetokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes.servicetokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "401":
          description: missing or invalid X-Service-Key
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "403":
          description: service not in allowed list
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: service not found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      summary: Request a virtual key as a service account
      tags:
      - service-accounts
  /v1/serviceaccounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/serviceaccounts.ServiceAccount'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List service accounts
      tags:
      - service-accounts
    post:
      consumes:
      - application/json
      parameters:
      - description: Service account to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serviceaccounts.ServiceAccount'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/serviceaccounts.ServiceAccount'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: service account already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create service account
      tags:
      - service-accounts
  /v1/serviceaccounts/{id}:
    delete:
      parameters:
      - description: Service account ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Delete service account
      tags:
      - service-accounts
  /v1/services:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.Service'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List services
      tags:
      - services
    post:
      consumes:
      - application/json
      parameters:
      - description: Service to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.Service'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.Service'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: root key not found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: service already exists
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create service
      tags:
      - services
  /v1/services/{id}:
    delete:
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Delete service
      tags:
      - services
    put:
      consumes:
      - application/json
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated service
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.Service'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.Service'
        "400":
          description: invalid request or id mismatch
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: service or root key not found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Update service
      tags:
      - services
  /v1/setup:
    post:
      consumes:
      - application/json
      description: Creates the first admin user and organization. Returns 409 if the
        system is already initialized. No authentication required.
      parameters:
      - description: Bootstrap request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/routes.SetupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/routes.SetupResponse'
        "400":
          description: missing required fields
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "409":
          description: already initialized
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      summary: Bootstrap Bifrost
      tags:
      - setup
  /v1/token/refresh:
    post:
      description: Accepts a valid bearer token and returns a new one with a fresh
        24h expiry.
      produces:
      - application/json
      responses:
        "200":
          description: 'New token: {\"token\":\"...\"}'
          schema:
            type: object
        "401":
          description: invalid or expired token
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh bearer token
      tags:
      - users
  /v1/user:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: User with orgs array
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get authenticated user
      tags:
      - users
  /v1/users:
    post:
      consumes:
