services:
  bifrost:
    build: .
    ports:
      - "${BIFROST_PORT:-3333}:3333"
    environment:
      BIFROST_PORT: "3333"
      BIFROST_DB: postgres
      BIFROST_SIGNING_KEY: ${BIFROST_SIGNING_KEY:?BIFROST_SIGNING_KEY is required}
      BIFROST_ENCRYPTION_KEY: ${BIFROST_ENCRYPTION_KEY:-}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://bifrost:bifrost@postgres:5432/bifrost?sslmode=disable}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  migrate:
    build: .
    entrypoint: ["/app/bifrost-server"]
    command: ["--migrate-only"]
    environment:
      BIFROST_DB: postgres
      BIFROST_SIGNING_KEY: ${BIFROST_SIGNING_KEY:?BIFROST_SIGNING_KEY is required}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://bifrost:bifrost@postgres:5432/bifrost?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  setup-job:
    build: .
    entrypoint: ["/app/bifrost-cli"]
    command: ["init-admin", "--name", "${ADMIN_NAME:-admin}", "--org-name", "${ADMIN_ORG:-Default}", "--email", "${ADMIN_EMAIL:?ADMIN_EMAIL is required}"]
    environment:
      BIFROST_DB: postgres
      BIFROST_SIGNING_KEY: ${BIFROST_SIGNING_KEY:?BIFROST_SIGNING_KEY is required}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://bifrost:bifrost@postgres:5432/bifrost?sslmode=disable}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - internal

  cli:
    build: .
    profiles:
      - cli
    environment:
      BIFROST_SIGNING_KEY: ${BIFROST_SIGNING_KEY:?BIFROST_SIGNING_KEY is required}
      BIFROST_PORT: "3333"
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://bifrost:bifrost@postgres:5432/bifrost?sslmode=disable}
    entrypoint: ["/app/bifrost-cli"]
    networks:
      - internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bifrost
      POSTGRES_PASSWORD: bifrost
      POSTGRES_DB: bifrost
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bifrost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
